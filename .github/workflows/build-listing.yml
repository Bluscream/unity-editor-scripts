name: Build VPM Listing

on:
  push:
    branches: [main]
    paths:
      - "Packages/**"
      - "Website/**"
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      LISTING_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package and publish each VPM package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for pkg in Packages/*/; do
            [ -f "${pkg}package.json" ] || continue
            name=$(node -p "require('./${pkg}package.json').name")
            version=$(node -p "require('./${pkg}package.json').version")
            tag="${name}-${version}"
            zip="dist/${tag}.zip"
            echo "::group::${tag}"
            ( cd "$pkg" && zip -r -q -X "${GITHUB_WORKSPACE}/${zip}" . -x '.git*' )
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release upload "$tag" "$zip" --clobber
            else
              gh release create "$tag" "$zip" \
                --title "$tag" \
                --notes "Automated VPM package release of ${name} v${version}."
            fi
            echo "::endgroup::"
          done

      - name: Generate index.json and landing page
        run: node .github/scripts/build-index.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
